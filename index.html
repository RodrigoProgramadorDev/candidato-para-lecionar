<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidatos</title>
</head>
<body>
    <h1>Candidatar-se para lecionar</h1>
    <form action="">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" title="nome" required>
        <br>
        <label for="email">E-mail:</label>
        <input type="email" name="email" id="email">
        <br>
        <label for="idade">Idade:</label>
        <input type="number" name="idade" id="idade" min="18" max="75">
        <br>
        <label for="materia">Para qual matéria você está se candidatando para lecionar:</label>
        <select name="materia" id="materia">
            <option value="matematica">Matemática</option>
            <option value="portugues">Português</option>
            <option value="biologia">Biologia</option>
            <option value="ciencias">Ciências</option>
            <option value="historia">História</option>
            <option value="geografia">Geografia</option>
            <option value="arte">Arte</option>
        </select>
        <br>
        <label for="escolaridade">Nível de escolaridade:</label>
        <select name="escolaridade" id="escolaridade">
            <option value="superio-completo">Ensino Superior Completo</option>
            <option value="mestrado-cursando">Cursando Mestrado</option>
            <option value="mestrado-completo">Mestrado Completo</option>
            <option value="doutorado-cursando">Cursando Doutorado</option>
            <option value="doutorado-completo">Doutorado Completo</option>
        </select>
        <br>
        <label for="descricao">Descrição sobre si mesmo:</label>
        <br>
        <textarea name="descricao" id="descricao" cols="30" rows="10" maxlength="200"></textarea>        
    </form>
</body>
</html>
